<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Franziskus-Schule">
  <title>Franziskus-Schule</title>
  <!-- Die Spirale aus dem Schullogo: außen kühl wie die Welle,
       zur Mitte hin warm wie der leuchtende Kern. -->
  <defs>
    <radialGradient id="spirale" cx="50%" cy="50%" r="52%">
      <stop offset="0%"   stop-color="#F7D774"/>
      <stop offset="22%"  stop-color="#E8A468"/>
      <stop offset="45%"  stop-color="#D9813E"/>
      <stop offset="72%"  stop-color="#7C6E8F"/>
      <stop offset="100%" stop-color="#3F4D7A"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="#F5EFE6"/>

  <path d="M 58 32
           A 26 26 0 1 1 6 32
           A 22 22 0 1 1 50 32
           A 18 18 0 1 1 14 32
           A 14 14 0 1 1 42 32
           A 10 10 0 1 1 22 32
           A 6 6 0 1 1 34 32"
        fill="none"
        stroke="url(#spirale)"
        stroke-width="6.5"
        stroke-linecap="round"/>

  <circle cx="31" cy="32" r="3.4" fill="#F7D774"/>
</svg>
